<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LinguaLearn">
<meta name="theme-color" content="#0a0a0f">
<title>LinguaLearn</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c26;--bg4:#252532;
  --bd:#2e2e3e;--bd2:#3d3d52;
  --tx:#f0f0f5;--tx2:#9090a8;--tx3:#5a5a72;
  --green:#4ade80;--green-dk:#22c55e;--green-bg:#0d2818;
  --blue:#60a5fa;--blue-dk:#3b82f6;--blue-bg:#0d1e3a;
  --red:#f87171;--red-bg:#2a0d0d;
  --gold:#fbbf24;--gold-bg:#2a1e05;
  --purple:#a78bfa;--purple-bg:#1a0d2e;
  --accent:#6366f1;--accent2:#818cf8;
}
@media(prefers-color-scheme:light){:root{
  --bg:#f8f8fc;--bg2:#ffffff;--bg3:#f0f0f8;
  --bd:#d8d8e8;--bd2:#c0c0d8;
  --tx:#0a0a1a;--tx2:#4a4a6a;--tx3:#9090b0;
  --green-bg:#e8faf0;--blue-bg:#e8f0ff;--red-bg:#fff0f0;--gold-bg:#fffbeb;--purple-bg:#f5f0ff;
}}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;}
.app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100%;overflow-y:auto;}
.screen.active{display:flex;}
.home-header{padding:max(env(safe-area-inset-top),20px) 1.25rem 1rem;display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
.app-brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;border-radius:10px;overflow:hidden;}
.brand-icon img{width:100%;height:100%;object-fit:cover;}
.brand-name{font-size:20px;font-weight:700;color:var(--tx);}
.streak-badge{display:flex;align-items:center;gap:5px;background:var(--gold-bg);border:1px solid var(--gold);border-radius:99px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--gold);}
.xp-section{padding:0 1.25rem 1rem;}
.level-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.level-label{font-size:13px;font-weight:600;color:var(--accent2);}
.xp-label{font-size:12px;color:var(--tx2);}
.xp-track{height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;border:1px solid var(--bd);}
.xp-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.8s ease;}
.section-head{padding:0 1.25rem 0.6rem;display:flex;align-items:center;justify-content:space-between;}
.section-head h2{font-size:16px;font-weight:600;color:var(--tx);}
.section-head span{font-size:12px;color:var(--tx2);}
.lang-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 1.25rem 1rem;}
.lang-card{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:1rem 0.5rem;text-align:center;cursor:pointer;transition:transform 0.15s;user-select:none;}
.lang-card:active{transform:scale(0.93);}
.lang-card.sel{border:2px solid var(--accent);background:var(--purple-bg);}
.lang-flag{font-size:30px;margin-bottom:6px;display:block;}
.lang-name{font-size:13px;font-weight:600;color:var(--tx);}
.lang-sub{font-size:10px;color:var(--tx2);margin-top:2px;}
.lang-prog{display:flex;justify-content:center;gap:3px;margin-top:7px;}
.lpd{width:5px;height:5px;border-radius:50%;background:var(--bd2);}
.lpd.on{background:var(--accent);}
.cat-scroll{overflow-x:auto;padding:0 1.25rem 0.75rem;display:flex;gap:8px;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:500;background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;white-space:nowrap;}
.cat-pill.sel{background:var(--purple-bg);border-color:var(--accent);color:var(--accent2);font-weight:600;}
.lesson-list{flex:1;overflow-y:auto;padding:0 1.25rem;display:flex;flex-direction:column;gap:8px;}
.lesson-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:13px;cursor:pointer;transition:background 0.1s;}
.lesson-item:active{background:var(--bg3);}
.lesson-item.locked{opacity:0.4;cursor:not-allowed;}
.li-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.li-icon.blue{background:var(--blue-bg);}
.li-icon.green{background:var(--green-bg);}
.li-icon.purple{background:var(--purple-bg);}
.li-icon.gold{background:var(--gold-bg);}
.li-icon.red{background:var(--red-bg);}
.li-body{flex:1;}
.li-name{font-size:14px;font-weight:600;color:var(--tx);}
.li-meta{font-size:12px;color:var(--tx2);margin-top:2px;}
.li-stars{font-size:12px;color:var(--gold);margin-top:2px;}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.li-badge{font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green);border-radius:99px;padding:3px 8px;}
.start-bar{padding:0.75rem 1.25rem;padding-bottom:max(0.75rem,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--bd);}
.start-btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:17px;font-weight:700;cursor:pointer;}
.start-btn:active{opacity:0.85;}
.start-btn:disabled{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd);}
.les-header{display:flex;align-items:center;gap:10px;padding:max(env(safe-area-inset-top),16px) 1.25rem 14px;background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0;}
.x-btn{width:36px;height:36px;border:1px solid var(--bd2);border-radius:9px;background:none;color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prog-bar{flex:1;height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.4s ease;}
.hearts{display:flex;gap:4px;flex-shrink:0;}
.hrt{font-size:18px;transition:filter 0.3s;}
.hrt.lost{filter:grayscale(1) opacity(0.2);}
.q-scroll{flex:1;overflow-y:auto;padding:1.25rem 1.25rem 0.5rem;}
.srs-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;border-radius:99px;padding:3px 9px;margin-bottom:10px;}
.srs-pill.new{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue);}
.srs-pill.review{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold);}
.srs-pill.hard{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.mode-badge{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--tx2);margin-bottom:10px;display:block;}
.q-word{font-size:32px;font-weight:700;color:var(--tx);margin-bottom:4px;line-height:1.2;}
.q-word.sm{font-size:22px;}
.audio-player{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:1.25rem;margin-bottom:1rem;}
.ap-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.play-btn{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff;}
.play-btn:active{opacity:0.8;}
.play-btn.playing{background:var(--blue-dk);}
.ap-info{flex:1;}
.ap-lang{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent2);margin-bottom:3px;}
.ap-word{font-size:20px;font-weight:700;color:var(--tx);}
.ap-ipa{font-size:12px;color:var(--tx2);margin-top:2px;font-style:italic;}
.speed-row{display:flex;gap:6px;}
.speed-btn{padding:5px 10px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);cursor:pointer;}
.speed-btn.active{background:var(--purple-bg);border-color:var(--accent);color:var(--accent2);}
.repeat-section{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:1.25rem;margin-bottom:1rem;text-align:center;}
.timer-ring{width:80px;height:80px;margin:0 auto 12px;position:relative;}
.timer-svg{transform:rotate(-90deg);}
.timer-track{fill:none;stroke:var(--bd2);stroke-width:6;}
.timer-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.1s linear;}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:700;color:var(--tx);}
.repeat-label{font-size:14px;color:var(--tx2);margin-bottom:12px;}
.mic-btn{width:60px;height:60px;border-radius:50%;background:var(--red-bg);border:2px solid var(--red);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;}
.mic-btn.listening{border-color:var(--green);background:var(--green-bg);}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1rem;}
.ch{background:var(--bg2);border:2px solid var(--bd);border-radius:14px;padding:15px 10px;font-size:15px;font-weight:500;color:var(--tx);cursor:pointer;text-align:center;font-family:inherit;user-select:none;}
.ch:active:not(:disabled){transform:scale(0.96);}
.ch.ok{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--green);}
.ch.no{border-color:var(--red)!important;background:var(--red-bg)!important;color:var(--red);}
.t-input{width:100%;padding:15px;font-size:17px;border:2px solid var(--bd);border-radius:14px;background:var(--bg2);color:var(--tx);font-family:inherit;margin-bottom:1rem;}
.t-input:focus{outline:none;border-color:var(--accent);}
.t-input.ok{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.t-input.no{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.sent-area{min-height:52px;border:2px solid var(--bd);border-radius:14px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;background:var(--bg2);}
.wbank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.wchip{background:var(--bg3);border:1px solid var(--bd2);border-radius:9px;padding:9px 14px;font-size:14px;cursor:pointer;color:var(--tx);user-select:none;}
.wchip:active{transform:scale(0.94);}
.wchip.placed{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}
.les-bot{padding:0.75rem 1.25rem;padding-bottom:max(0.75rem,env(safe-area-inset-bottom));border-top:1px solid var(--bd);background:var(--bg);flex-shrink:0;}
.chk-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;}
.chk-btn:disabled{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd);}
.fb-top{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.fb-ico{font-size:22px;}
.fb-ttl{font-size:17px;font-weight:700;}
.fb-ttl.ok{color:var(--green);}.fb-ttl.no{color:var(--red);}
.fb-ans{font-size:13px;color:var(--tx2);margin-bottom:12px;line-height:1.4;}
.cont-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;}
.cont-btn.ok{background:var(--green-dk);color:#fff;}
.cont-btn.no{background:var(--red);color:#fff;}
.result-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;padding-bottom:max(2rem,env(safe-area-inset-bottom));text-align:center;}
.r-ico{font-size:80px;margin-bottom:16px;}
.r-ttl{font-size:26px;font-weight:700;color:var(--tx);margin-bottom:6px;}
.r-sub{font-size:15px;color:var(--tx2);margin-bottom:1.75rem;}
.r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;margin-bottom:1.75rem;}
.rs{background:var(--bg2);border-radius:14px;padding:16px 8px;border:1px solid var(--bd);}
.rs-v{font-size:26px;font-weight:700;color:var(--tx);}
.rs-l{font-size:11px;color:var(--tx2);margin-top:3px;}
.r-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.btn-ag{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;}
.btn-hm{background:var(--bg2);color:var(--tx);border:1px solid var(--bd);border-radius:14px;padding:16px;font-size:16px;cursor:pointer;}
.install-hint{display:none;margin:0 1.25rem 0.75rem;padding:12px;background:var(--blue-bg);border:1px solid var(--blue);border-radius:12px;align-items:center;gap:10px;}
.install-hint.show{display:flex;}
.ih-txt{flex:1;font-size:12px;color:var(--tx2);line-height:1.5;}
.ih-txt strong{color:var(--blue);display:block;font-size:13px;margin-bottom:2px;}
.ih-close{background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer;padding:4px;}
</style>
</head>
<body>
<div class="app">
<div class="screen active" id="s-home">
  <div class="home-header">
    <div class="app-brand">
      <div class="brand-icon"><img src="icons/icon-192.png" alt=""></div>
      <span class="brand-name">LinguaLearn</span>
    </div>
    <div class="streak-badge">ðŸ”¥ <span id="streak-num">0 days</span></div>
  </div>
  <div class="xp-section">
    <div class="level-row">
      <span class="level-label" id="level-lbl">Level 1</span>
      <span class="xp-label" id="xp-lbl">0 / 200 XP</span>
    </div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
  <div class="install-hint" id="install-hint">
    <div style="font-size:22px">ðŸ“²</div>
    <div class="ih-txt"><strong>Add to Home Screen</strong>Safari â†’ Share â†’ Add to Home Screen</div>
    <button class="ih-close" onclick="document.getElementById('install-hint').classList.remove('show')">âœ•</button>
  </div>
  <div class="section-head"><h2>Choose language</h2></div>
  <div class="lang-grid">
    <div class="lang-card" id="lc-german" onclick="selLang('german')">
      <span class="lang-flag">ðŸ‡©ðŸ‡ª</span>
      <div class="lang-name">German</div><div class="lang-sub">Deutsch</div>
      <div class="lang-prog" id="lp-german"></div>
    </div>
    <div class="lang-card" id="lc-french" onclick="selLang('french')">
      <span class="lang-flag">ðŸ‡«ðŸ‡·</span>
      <div class="lang-name">French</div><div class="lang-sub">FranÃ§ais</div>
      <div class="lang-prog" id="lp-french"></div>
    </div>
    <div class="lang-card" id="lc-latin" onclick="selLang('latin')">
      <span class="lang-flag">ðŸ›ï¸</span>
      <div class="lang-name">Latin</div><div class="lang-sub">Latina</div>
      <div class="lang-prog" id="lp-latin"></div>
    </div>
  </div>
  <div id="cat-head" class="section-head" style="display:none"><h2>Category</h2></div>
  <div id="cat-scroll" class="cat-scroll" style="display:none"></div>
  <div id="les-head" class="section-head" style="display:none"><h2>Lessons</h2><span id="srs-count"></span></div>
  <div class="lesson-list" id="lesson-list"></div>
  <div class="start-bar">
    <button class="start-btn" id="start-btn" disabled onclick="beginLesson()">Select a language</button>
  </div>
</div>

<div class="screen" id="s-lesson">
  <div class="les-header">
    <button class="x-btn" onclick="goHome()">âœ•</button>
    <div class="prog-bar"><div class="prog-fill" id="p-fill" style="width:0%"></div></div>
    <div class="hearts" id="hrt-wrap"></div>
  </div>
  <div class="q-scroll" id="q-scroll"></div>
  <div class="les-bot" id="les-bot">
    <button class="chk-btn" id="chk-btn" disabled onclick="checkAns()">Check</button>
  </div>
</div>

<div class="screen" id="s-result">
  <div class="result-wrap">
    <div class="r-ico" id="r-ico"></div>
    <div class="r-ttl" id="r-ttl"></div>
    <div class="r-sub" id="r-sub"></div>
    <div class="r-stats">
      <div class="rs"><div class="rs-v" id="rs-xp"></div><div class="rs-l">XP earned</div></div>
      <div class="rs"><div class="rs-v" id="rs-acc"></div><div class="rs-l">Accuracy</div></div>
      <div class="rs"><div class="rs-v" id="rs-str"></div><div class="rs-l">Streak</div></div>
    </div>
    <div class="r-btns">
      <button class="btn-ag" onclick="beginLesson()">Practice again</button>
      <button class="btn-hm" onclick="goHome()">Home</button>
    </div>
  </div>
</div>
</div>

<script>

      {w:"Fleisch",t:"Meat",ipa:"flysh",ex:"Das Fleisch ist gut."},

      {w:"Flughafen",t:"Airport",ipa:"floog-hahfen",ex:"Der Flughafen ist weit."},
      {w:"Hotel",t:"Hotel",ipa:"hoh-tel",ex:"Das Hotel ist modern."},

      {w:"rechts",t:"Right",ipa:"rechts",ex:"Dann rechts abbiegen."}
    ]
  },
  french: {
    basics: [
      {w:"chien",t:"Dog",ipa:"shyan",ex:"Le chien est mignon."},
      {w:"chat",t:"Cat",ipa:"sha",ex:"Le chat dort."},
      {w:"maison",t:"House",ipa:"meh-zon",ex:"La maison est grande."},
      {w:"eau",t:"Water",ipa:"oh",ex:"Je bois de l eau."},
      {w:"pain",t:"Bread",ipa:"pan",ex:"Le pain est frais."},

function srsNext(card,rating){
  var interval=card.interval||1,ease=card.ease||2.1,reps=card.reps||0;
  if(rating==="hard"){interval=Math.max(1,Math.floor(interval*0.5));ease=Math.max(1.3,ease-0.2);}
  else if(rating==="good"){interval=reps<2?(reps===0?1:4):Math.round(interval*ease);}
  else{interval=reps<2?(reps===0?4:7):Math.round(interval*ease*1.3);ease=Math.min(3,ease+0.1);}
  return Object.assign({},card,{interval:interval,ease:ease,reps:reps+1,due:Date.now()+interval*86400000});
}
function speak(text,lang,rate){

  var btn=document.getElementById("play-btn-main");

  window.speechSynthesis.speak(u);
}

function buildQueue(){
  var vocab=VOCAB[S.lang][S.cat]||[],now=Date.now();
  var due=vocab.filter(function(v){var c=S.srs[S.lang+"_"+S.cat+"_"+v.w];return !c||c.due<=now;});
  var notDue=vocab.filter(function(v){var c=S.srs[S.lang+"_"+S.cat+"_"+v.w];return c&&c.due>now;});
  var pool=shuf(due).concat(shuf(notDue)).slice(0,8);
  var modes=["audio_mc","listen_repeat","type","word_bank"];
  return pool.map(function(v){
    var mode=modes[Math.floor(Math.random()*modes.length)];
    var card=S.srs[S.lang+"_"+S.cat+"_"+v.w];
    var srsState=!card?"new":(card.reps<3?"review":"hard");
    return Object.assign({},v,{mode:mode,srsState:srsState});
  });
}

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;

  var mic=document.getElementById("mic-btn");

  var r=new SR();
  r.lang=LANG_CODES[S.lang]||"en-US";
  r.continuous=false;r.interimResults=false;
  r.onresult=function(e){
    if(mic)mic.classList.remove("listening");
    var result=e.results[0][0].transcript;
    var lbl=document.getElementById("repeat-lbl");
    var q=qs[qi];
    var norm=function(s){return s.toLowerCase().replace(/[^a-z]/gi,"");};
    var ok=norm(result).includes(norm(q.w).slice(0,4));
    if(lbl)lbl.textContent=ok?"Great pronunciation! âœ“":"Heard: "+result;
  };
  r.onerror=function(){if(mic)mic.classList.remove("listening");};

  if(!ok)document.querySelectorAll(".ch").forEach(function(b){if(b.textContent===correctAns)b.classList.add("ok");});
  var q=qs[qi],key=S.lang+"_"+S.cat+"_"+q.w;
  var card=S.srs[key]||{w:q.w};
  S.srs[key]=srsNext(card,ok?"good":"hard");
  if(ok)correct++;else{hearts=Math.max(0,hearts-1);renderHearts();}
  showFB(ok,ok?null:correctAns);
}
function checkAns(){
  var q=qs[qi],ok=false,ans="";
  if(q.mode==="type"){
    var v=(document.getElementById("t-in")||{value:""}).value.trim().toLowerCase();
    var norm=function(s){return s.toLowerCase().replace(/[^a-z]/gi,"");};
    ok=norm(v)===norm(q.t);
    ans=q.t;
    var el=document.getElementById("t-in");
    if(el){el.disabled=true;el.className="t-input "+(ok?"ok":"no");}
  } else {
    var user=placed.map(function(p){return p.w;}).join(" ");
    ok=user.toLowerCase()===q.t.toLowerCase();ans=q.t;
  }
  var key=S.lang+"_"+S.cat+"_"+q.w;
  var card=S.srs[key]||{w:q.w};
  S.srs[key]=srsNext(card,ok?"good":"hard");
  if(ok)correct++;else{hearts=Math.max(0,hearts-1);renderHearts();}
  var b=document.getElementById("chk-btn");if(b)b.disabled=true;
  showFB(ok,ok?null:ans);
}
function showFB(ok,wrongAns){
  var last=qi+1>=qs.length||hearts===0;
  var q=qs[qi];
  document.getElementById("les-bot").innerHTML=
    '<div class="fb-top"><span class="fb-ico">'+(ok?"âœ…":"âŒ")+'</span>'+
    '<span class="fb-ttl '+(ok?"ok":"no")+'">'+(ok?"Correct!":"Incorrect")+"</span></div>"+
    '<div class="fb-ans">'+(ok?q.ex:"Answer: "+wrongAns)+"</div>"+
    '<button class="cont-btn '+(ok?"ok":"no")+'" onclick="nextQ()">'+(last?"Finish":"Continue")+"</button>";
  if(ok)setTimeout(function(){speak(q.w,S.lang,0.9);},200);
}
function nextQ(){qi++;if(qi>=qs.length||hearts===0)showResult();else renderQ();}
function showResult(){
  var acc=Math.round(correct/qs.length*100),xp=correct*12;
  S.xp=(S.xp||0)+xp;S.level=Math.floor(S.xp/200)+1;
  if(acc>=60&&hearts>0){if(!S.completed[S.lang])S.completed[S.lang]={};S.completed[S.lang][S.cat]=true;}
  var today=new Date().toDateString();
  if(S.lastDate!==today){var yest=new Date(Date.now()-86400000).toDateString();S.streak=S.lastDate===yest?(S.streak||0)+1:1;S.lastDate=today;}
  save();
  document.getElementById("r-ico").textContent=correct===qs.length?"ðŸ†":hearts>0?"ðŸŽ‰":"ðŸ’”";
  document.getElementById("r-ttl").textContent=correct===qs.length?"Perfect!":hearts>0?"Well done!":"Out of hearts";
  document.getElementById("r-sub").textContent=correct+" of "+qs.length+" correct";
  document.getElementById("rs-xp").textContent="+"+xp;
  document.getElementById("rs-acc").textContent=acc+"%";
  document.getElementById("rs-str").textContent="ðŸ”¥"+S.streak;
  show("s-result");
}

function doPlay(){speak(qs[qi].w,S.lang,spd);}
function pickMCBtn(btn){
  var o=decodeURIComponent(btn.getAttribute("data-ans"));
  var c=decodeURIComponent(btn.getAttribute("data-correct"));
  pickMC(btn,o,c);
}
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");
load();
</script>
