<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c26;--bg4:#252532;
  --bd:#2e2e3e;--bd2:#3d3d52;
  --tx:#f0f0f5;--tx2:#9090a8;--tx3:#5a5a72;
  --green:#4ade80;--green-dk:#22c55e;--green-bg:#0d2818;
  --blue:#60a5fa;--blue-dk:#3b82f6;--blue-bg:#0d1e3a;
  --red:#f87171;--red-bg:#2a0d0d;
  --gold:#fbbf24;--gold-bg:#2a1e05;
  --purple:#a78bfa;--purple-bg:#1a0d2e;
  --accent:#6366f1;--accent2:#818cf8;
}
@media(prefers-color-scheme:light){:root{
  --bg:#f8f8fc;--bg2:#ffffff;--bg3:#f0f0f8;--bg4:#e8e8f4;
  --bd:#d8d8e8;--bd2:#c0c0d8;
  --tx:#0a0a1a;--tx2:#4a4a6a;--tx3:#9090b0;
  --green-bg:#e8faf0;--blue-bg:#e8f0ff;--red-bg:#fff0f0;--gold-bg:#fffbeb;--purple-bg:#f5f0ff;
}}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow:hidden;}
.app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100%;overflow-y:auto;overflow-x:hidden;}
.screen.active{display:flex;}

/* ── TYPOGRAPHY ── */
h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
h2{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
h3{font-size:16px;font-weight:600;}

/* ── HOME ── */
.home-header{
  padding:max(env(safe-area-inset-top),20px) 1.25rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);
}
.app-brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;border-radius:10px;overflow:hidden;}
.brand-icon img{width:100%;height:100%;object-fit:cover;}
.brand-name{font-size:20px;font-weight:700;color:var(--tx);letter-spacing:-0.3px;}
.streak-badge{
  display:flex;align-items:center;gap:5px;
  background:var(--gold-bg);border:1px solid var(--gold);
  border-radius:99px;padding:6px 12px;
  font-size:13px;font-weight:600;color:var(--gold);
}

.xp-section{padding:0 1.25rem 1rem;}
.level-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.level-label{font-size:13px;font-weight:600;color:var(--accent2);}
.xp-label{font-size:12px;color:var(--tx2);}
.xp-track{height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;border:1px solid var(--bd);}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.8s cubic-bezier(.34,1.56,.64,1);}

.section-head{padding:0 1.25rem 0.6rem;display:flex;align-items:center;justify-content:space-between;}
.section-head h2{font-size:16px;font-weight:600;color:var(--tx);}
.section-head span{font-size:12px;color:var(--tx2);}

.lang-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 1.25rem 1rem;}
.lang-card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
  padding:1rem 0.5rem;text-align:center;cursor:pointer;
  transition:transform 0.15s,border-color 0.2s;user-select:none;
}
.lang-card:active{transform:scale(0.94);}
.lang-card.sel{border:2px solid var(--accent);background:var(--purple-bg);}
.lang-flag{font-size:32px;margin-bottom:6px;display:block;}
.lang-name{font-size:13px;font-weight:600;color:var(--tx);}
.lang-sub{font-size:10px;color:var(--tx2);margin-top:2px;}
.lang-prog{display:flex;justify-content:center;gap:3px;margin-top:7px;}
.lpd{width:5px;height:5px;border-radius:50%;background:var(--bd2);}
.lpd.on{background:var(--accent);}

.cat-scroll{overflow-x:auto;padding:0 1.25rem 0.75rem;display:flex;gap:8px;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-pill{
  flex-shrink:0;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:500;
  background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;white-space:nowrap;
}
.cat-pill.sel{background:var(--purple-bg);border-color:var(--accent);color:var(--accent2);font-weight:600;}

.lesson-list{flex:1;overflow-y:auto;padding:0 1.25rem;display:flex;flex-direction:column;gap:8px;}
.lesson-item{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border:1px solid var(--bd);border-radius:14px;
  padding:13px;cursor:pointer;transition:background 0.1s;
}
.lesson-item:active{background:var(--bg3);}
.lesson-item.locked{opacity:0.4;cursor:not-allowed;}
.li-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.li-icon.blue{background:var(--blue-bg);}
.li-icon.green{background:var(--green-bg);}
.li-icon.purple{background:var(--purple-bg);}
.li-icon.gold{background:var(--gold-bg);}
.li-icon.red{background:var(--red-bg);}
.li-body{flex:1;}
.li-name{font-size:14px;font-weight:600;color:var(--tx);}
.li-meta{font-size:12px;color:var(--tx2);margin-top:2px;}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.li-stars{font-size:12px;color:var(--gold);}
.li-badge{font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green);border-radius:99px;padding:3px 8px;}
.li-lock{font-size:18px;}

.start-bar{
  padding:0.75rem 1.25rem;padding-bottom:max(0.75rem,env(safe-area-inset-bottom));
  background:var(--bg);border-top:1px solid var(--bd);
}
.start-btn{
  width:100%;padding:16px;border:none;border-radius:14px;
  background:var(--accent);color:#fff;font-size:17px;font-weight:700;
  cursor:pointer;letter-spacing:-0.2px;transition:opacity 0.15s;
}
.start-btn:active{opacity:0.85;}
.start-btn:disabled{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd);}

/* ── LESSON SCREEN ── */
.les-header{
  display:flex;align-items:center;gap:10px;
  padding:max(env(safe-area-inset-top),16px) 1.25rem 14px;
  background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0;
}
.x-btn{
  width:36px;height:36px;border:1px solid var(--bd2);border-radius:9px;
  background:none;color:var(--tx2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.prog-bar{flex:1;height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.4s ease;}
.hearts{display:flex;gap:4px;flex-shrink:0;}
.hrt{font-size:18px;transition:filter 0.3s,transform 0.3s;}
.hrt.lost{filter:grayscale(1) opacity(0.2);transform:scale(0.8);}

.q-scroll{flex:1;overflow-y:auto;padding:1.5rem 1.25rem 0.5rem;}
.mode-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--tx2);margin-bottom:12px;
}
.mode-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.q-word{font-size:36px;font-weight:700;color:var(--tx);letter-spacing:-0.5px;margin-bottom:4px;line-height:1.2;}
.q-word.small{font-size:24px;}
.q-translation{font-size:15px;color:var(--tx2);margin-bottom:1.5rem;}

/* Audio player */
.audio-player{
  background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
  padding:1.25rem;margin-bottom:1rem;
}
.ap-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.play-btn{
  width:52px;height:52px;border-radius:50%;background:var(--accent);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;transition:transform 0.15s,opacity 0.15s;
}
.play-btn:active{transform:scale(0.92);}
.play-btn.playing{background:var(--blue-dk);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.4)}50%{box-shadow:0 0 0 12px rgba(99,102,241,0)}}
.ap-info{flex:1;}
.ap-lang{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent2);margin-bottom:3px;}
.ap-word{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-0.3px;}
.ap-ipa{font-size:13px;color:var(--tx2);margin-top:2px;font-style:italic;}
.speed-row{display:flex;gap:6px;}
.speed-btn{
  padding:5px 10px;border-radius:99px;font-size:12px;font-weight:600;
  border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);cursor:pointer;
}
.speed-btn.active{background:var(--purple-bg);border-color:var(--accent);color:var(--accent2);}

/* Repeat mode timer */
.repeat-section{
  background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
  padding:1.25rem;margin-bottom:1rem;text-align:center;
}
.timer-ring{width:80px;height:80px;margin:0 auto 12px;position:relative;}
.timer-svg{transform:rotate(-90deg);}
.timer-track{fill:none;stroke:var(--bd2);stroke-width:6;}
.timer-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.1s linear;}
.timer-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:22px;font-weight:700;color:var(--tx);
}
.repeat-label{font-size:14px;color:var(--tx2);margin-bottom:10px;}
.mic-btn{
  width:64px;height:64px;border-radius:50%;background:var(--red-bg);
  border:2px solid var(--red);margin:0 auto;display:flex;align-items:center;
  justify-content:center;font-size:28px;cursor:pointer;transition:transform 0.15s;
}
.mic-btn:active{transform:scale(0.92);}
.mic-btn.listening{animation:micpulse 0.8s infinite;border-color:var(--green);background:var(--green-bg);}
@keyframes micpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* MC choices */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1rem;}
.ch{
  background:var(--bg2);border:2px solid var(--bd);border-radius:14px;
  padding:15px 10px;font-size:15px;font-weight:500;color:var(--tx);
  cursor:pointer;text-align:center;font-family:inherit;user-select:none;
  transition:border-color 0.1s,background 0.1s;
}
.ch:active:not(:disabled){transform:scale(0.96);}
.ch.ok{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--green);}
.ch.no{border-color:var(--red)!important;background:var(--red-bg)!important;color:var(--red);}

/* Type input */
.t-wrap{margin-bottom:1rem;}
.t-input{
  width:100%;padding:15px;font-size:18px;border:2px solid var(--bd);
  border-radius:14px;background:var(--bg2);color:var(--tx);font-family:inherit;
  caret-color:var(--accent);
}
.t-input:focus{outline:none;border-color:var(--accent);}
.t-input.ok{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.t-input.no{border-color:var(--red);background:var(--red-bg);color:var(--red);}

/* Word bank */
.sent-area{
  min-height:54px;border:2px solid var(--bd);border-radius:14px;
  padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;
  background:var(--bg2);
}
.wbank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.wchip{
  background:var(--bg3);border:1px solid var(--bd2);border-radius:9px;
  padding:9px 14px;font-size:14px;cursor:pointer;color:var(--tx);user-select:none;
}
.wchip:active{transform:scale(0.94);}
.wchip.placed{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}

/* Bottom bar */
.les-bot{
  padding:0.75rem 1.25rem;
  padding-bottom:max(0.75rem,env(safe-area-inset-bottom));
  border-top:1px solid var(--bd);background:var(--bg);flex-shrink:0;
}
.chk-btn{
  width:100%;padding:15px;border:none;border-radius:14px;
  font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-0.2px;
  background:var(--accent);color:#fff;
}
.chk-btn:active{opacity:0.85;}
.chk-btn:disabled{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd);}
.fb-wrap{}
.fb-top{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.fb-ico{font-size:22px;}
.fb-ttl{font-size:17px;font-weight:700;}
.fb-ttl.ok{color:var(--green);} .fb-ttl.no{color:var(--red);}
.fb-ans{font-size:13px;color:var(--tx2);margin-bottom:12px;line-height:1.4;}
.cont-btn{
  width:100%;padding:15px;border:none;border-radius:14px;
  font-size:16px;font-weight:700;cursor:pointer;
}
.cont-btn.ok{background:var(--green-dk);color:#fff;}
.cont-btn.no{background:var(--red);color:#fff;}

/* ── RESULT ── */
.result-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:2rem 1.5rem;
  padding-bottom:max(2rem,env(safe-area-inset-bottom));text-align:center;
}
.r-ico{font-size:80px;margin-bottom:16px;}
.r-ttl{font-size:26px;font-weight:700;color:var(--tx);margin-bottom:6px;letter-spacing:-0.4px;}
.r-sub{font-size:15px;color:var(--tx2);margin-bottom:1.75rem;line-height:1.5;}
.r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;margin-bottom:1.75rem;}
.rs{background:var(--bg2);border-radius:14px;padding:16px 8px;border:1px solid var(--bd);}
.rs-v{font-size:26px;font-weight:700;color:var(--tx);letter-spacing:-0.5px;}
.rs-l{font-size:11px;color:var(--tx2);margin-top:3px;}
.r-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.btn-ag{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;}
.btn-hm{background:var(--bg2);color:var(--tx);border:1px solid var(--bd);border-radius:14px;padding:16px;font-size:16px;cursor:pointer;}

/* Install hint */
.install-hint{
  display:none;margin:0 1.25rem 0.75rem;padding:12px;
  background:var(--blue-bg);border:1px solid var(--blue);border-radius:12px;
  align-items:center;gap:10px;
}
.install-hint.show{display:flex;}
.ih-txt{flex:1;font-size:12px;color:var(--tx2);line-height:1.5;}
.ih-txt strong{color:var(--blue);display:block;font-size:13px;margin-bottom:2px;}
.ih-close{background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer;padding:4px;}

/* SRS pill */
.srs-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;border-radius:99px;padding:3px 9px;
  margin-bottom:12px;
}
.srs-pill.new{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue);}
.srs-pill.review{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold);}
.srs-pill.hard{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
</style>
</head>

// ══ SRS ENGINE ══
// Each word card: {word, due, interval, ease, reps}
const SRS_EASE = {easy:2.5, good:2.1, hard:1.3};
function srsNext(card, rating) {
  let {interval=1, ease=2.1, reps=0} = card;
  if(rating === 'hard') { interval = Math.max(1, Math.floor(interval * 0.5)); ease = Math.max(1.3, ease - 0.2); }
  else if(rating === 'good') { interval = reps < 2 ? (reps===0?1:4) : Math.round(interval * ease); }
  else { interval = reps < 2 ? (reps===0?4:7) : Math.round(interval * ease * 1.3); ease = Math.min(3, ease + 0.1); }
  const due = Date.now() + interval * 86400000;
  return {...card, interval, ease, reps: reps+1, due};
}

// ══ SPEECH ══
function speak(text, lang, rate=1){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='latin'?'it-IT':LANG_CODES[lang]; // Latin uses Italian voice as closest
  u.rate=rate; u.pitch=1;
  const el=document.getElementById('play-btn-main');
  if(el){el.classList.add('playing');u.onend=()=>el.classList.remove('playing');}
  window.speechSynthesis.speak(u);
}

let micRecognition=null;
function startMic(callback){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){callback(null);return;}
  micRecognition=new SR();
  micRecognition.lang=S.lang==='latin'?'it-IT':LANG_CODES[S.lang];
  micRecognition.continuous=false;micRecognition.interimResults=false;
  micRecognition.onresult=e=>callback(e.results[0][0].transcript);
  micRecognition.onerror=()=>callback(null);
  micRecognition.start();
}

// ══ LESSON ENGINE ══
const MODES = ['audio_mc','listen_repeat','type','word_bank'];

function buildQueue(){
  const vocab=VOCAB[S.lang][S.cat]||[];
  const now=Date.now();
  // Prioritise SRS due cards, then new
  const due=vocab.filter(v=>{const c=S.srs[S.lang+'_'+S.cat+'_'+v.w];return !c||c.due<=now;});
  const notDue=vocab.filter(v=>{const c=S.srs[S.lang+'_'+S.cat+'_'+v.w];return c&&c.due>now;});
  const pool=[...shuf(due),...shuf(notDue)].slice(0,8);
  // For each word, pick a random mode
  return pool.map(v=>{
    const mode=MODES[Math.floor(Math.random()*MODES.length)];
    const srsCard=S.srs[S.lang+'_'+S.cat+'_'+v.w];
    const srsState=!srsCard?'new':(srsCard.reps<3?'review':'hard');
    return {...v, mode, srsState};
  });
}

function beginLesson(){
  if(!S.lang)return;
  qs=buildQueue(); qi=0; hearts=3; correct=0;
  show('s-lesson'); renderHearts(); renderQ();
}

function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

    const bankWords=shuf([...tWords,...extra]);
    html+=`<div class="sent-area" id="sent" onclick="rmLast()"></div>`;
    html+=`<div class="wbank">`+bankWords.map((w,i)=>`<span class="wchip" id="wc-${i}" onclick="placeW(${i},'${w}')">${w}</span>`).join('')+'</div>';
    document.getElementById('les-bot').innerHTML='<button class="chk-btn" id="chk-btn" disabled onclick="checkAns()">Check</button>';
  }

  document.getElementById('q-scroll').innerHTML=html;
  if(q.mode==='type')setTimeout(()=>{const e=document.getElementById('t-in');if(e)e.focus();},100);
}

function setSpeed(s,btn){
  speed=s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function startRepeatTimer(){
  let t=3;
  const circle=document.getElementById('timer-circle');
  const num=document.getElementById('timer-num');
  const lbl=document.getElementById('repeat-lbl');
  const mic=document.getElementById('mic-btn');
  const circ=2*Math.PI*34;
  if(!circle)return;
  timerInt=setInterval(()=>{
    t-=0.1;
    if(circle)circle.style.strokeDashoffset=circ*(1-(3-t)/3);
    if(num)num.textContent=Math.ceil(Math.max(0,t));
    if(t<=0){
      clearInterval(timerInt);timerInt=null;
      if(lbl)lbl.textContent='Now say it aloud!';
      if(mic){mic.style.pointerEvents='';mic.style.opacity='1';}
    }
  },100);
}

function doMic(){
  const mic=document.getElementById('mic-btn');
  if(mic)mic.classList.add('listening');
  startMic((result)=>{
    if(mic)mic.classList.remove('listening');
    if(result){
      const q=qs[qi];
      const norm=s=>s.toLowerCase().replace(/[^a-zÀ-ÿ]/gi,'');
      const ok=norm(result).includes(norm(q.w))||norm(q.w).includes(norm(result).slice(0,4));
      const lbl=document.getElementById('repeat-lbl');
      if(lbl)lbl.textContent=ok?'Great pronunciation! ✓':'Heard: "'+result+'" — keep practicing';
    }
  });
}

function markRepeat(correct_){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  const q=qs[qi];
  const key=S.lang+'_'+S.cat+'_'+q.w;
  const card=S.srs[key]||{w:q.w};
  S.srs[key]=srsNext(card, correct_?'good':'hard');
  if(correct_)correct++;
  else{hearts=Math.max(0,hearts-1);renderHearts();}
  showFB(correct_,correct_?null:q.t+' — keep practicing!');
}

function onType(){
  const v=document.getElementById('t-in')?.value.trim();
  const b=document.getElementById('chk-btn');
  if(b)b.disabled=!v?.length;
}

function placeW(i,w){
  const chip=document.getElementById('wc-'+i);
  if(!chip||chip.style.display==='none')return;
  chip.style.display='none';
  placed.push({i,w});
  const s=document.getElementById('sent'),sp=document.createElement('span');
  sp.className='wchip placed';sp.textContent=w;s.appendChild(sp);
  const b=document.getElementById('chk-btn');if(b)b.disabled=false;
}

function rmLast(){
  if(!placed.length)return;
  const last=placed.pop();
  document.getElementById('wc-'+last.i).style.display='';
  const s=document.getElementById('sent');if(s.lastChild)s.removeChild(s.lastChild);
  const b=document.getElementById('chk-btn');if(b)b.disabled=!placed.length;
}

function pickMC(btn,chosen,correct_ans){
  document.querySelectorAll('.ch').forEach(b=>b.disabled=true);
  const ok=chosen===correct_ans;
  btn.classList.add(ok?'ok':'no');
  if(!ok)document.querySelectorAll('.ch').forEach(b=>{if(b.textContent===correct_ans)b.classList.add('ok');});
  const q=qs[qi];
  const key=S.lang+'_'+S.cat+'_'+q.w;
  const card=S.srs[key]||{w:q.w};
  S.srs[key]=srsNext(card,ok?'good':'hard');
  if(ok)correct++;else{hearts=Math.max(0,hearts-1);renderHearts();}
  showFB(ok,ok?null:correct_ans);
}

function checkAns(){
  const q=qs[qi];
  let ok=false,ans='';
  if(q.mode==='type'){
    const v=(document.getElementById('t-in')?.value||'').trim().toLowerCase();
    const norm=s=>s.toLowerCase().replace(/[^a-zÀ-ÿ]/gi,'');
    ok=norm(v)===norm(q.t)||norm(q.t).startsWith(norm(v))&&norm(v).length>3;
    ans=q.t;
    const el=document.getElementById('t-in');
    if(el){el.disabled=true;el.className='t-input '+(ok?'ok':'no');}
  } else {
    const user=placed.map(p=>p.w).join(' ');
    ok=user.toLowerCase()===q.t.toLowerCase();
    ans=q.t;
  }
  const key=S.lang+'_'+S.cat+'_'+q.w;
  const card=S.srs[key]||{w:q.w};
  S.srs[key]=srsNext(card,ok?'good':'hard');
  if(ok)correct++;else{hearts=Math.max(0,hearts-1);renderHearts();}
  const b=document.getElementById('chk-btn');if(b)b.disabled=true;
  showFB(ok,ok?null:ans);
}

function showFB(ok,wrongAns){
  const last=qi+1>=qs.length||hearts===0;
  const q=qs[qi];
  document.getElementById('les-bot').innerHTML=`<div class="fb-wrap">
    <div class="fb-top"><span class="fb-ico">${ok?'✅':'❌'}</span><span class="fb-ttl ${ok?'ok':'no'}">${ok?'Correct!':'Incorrect'}</span></div>
    <div class="fb-ans">${ok?`"${q.ex}"`:('Answer: '+wrongAns)}</div>
    <button class="cont-btn ${ok?'ok':'no'}" onclick="nextQ()">${last?'Finish':'Continue'}</button>
  </div>`;
  if(ok)speak(q.w,S.lang,0.9);
}

function nextQ(){
  qi++;
  if(qi>=qs.length||hearts===0)showResult();
  else renderQ();
}

function showResult(){
  const acc=Math.round(correct/qs.length*100),xp=correct*12;
  S.xp=(S.xp||0)+xp; S.level=Math.floor(S.xp/200)+1;
  if(acc>=60&&hearts>0){
    if(!S.completed[S.lang])S.completed[S.lang]={};
    S.completed[S.lang][S.cat]=true;
  }
  const today=new Date().toDateString();
  if(S.lastDate!==today){
    const yest=new Date(Date.now()-86400000).toDateString();
    S.streak=S.lastDate===yest?(S.streak||0)+1:1;
    S.lastDate=today;
  }
  save();
  const perf=correct===qs.length;
  document.getElementById('r-ico').textContent=perf?'🏆':hearts>0?'🎉':'💔';
  document.getElementById('r-ttl').textContent=perf?'Perfect!':hearts>0?'Well done!':'Out of hearts';
  document.getElementById('r-sub').textContent=`${correct} of ${qs.length} correct · ${xp} XP earned`;
  document.getElementById('rs-xp').textContent='+'+xp;
  document.getElementById('rs-acc').textContent=acc+'%';
  document.getElementById('rs-str').textContent='🔥'+S.streak;
  show('s-result');
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
load();
</script>
</body>
</html>
